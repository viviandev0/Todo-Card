<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main>
    <section aria-labelledby="todo-title">
      <article class="container" id="test-todo-card">

        <!-- Header -->
        <header class="header">
          <div class="head">
            <h1 id="test-todo-title"><input type="text" placeholder="Enter your to-do title"></h1>
            <textarea name="description" id="test-todo-description" placeholder="To-do Description"></textarea>
          </div>

          <span id="test-todo-priority" aria-label="Priority level">
            
          </span>
        </header>

        <!-- Date Info -->
        <div class="date">
            <time 
                datetime="2026-04-16T18:00:00" 
                data-testid="test-todo-due-date"
                id="due-date"
            >
                Due Apr 16, 2026
            </time>

            <span 
                class="time-remaining"
                data-testid="test-todo-time-remaining"
                id="time-remaining"
            >
                Calculating...
            </span>

        </div>

        <!-- Progress -->
        <div class="progress" aria-label="Task progress">
          <div 
            class="test-todo-status" 
            role="progressbar"
            aria-valuenow="70"
            aria-valuemin="0"
            aria-valuemax="100"
            style="width: 70%;">
            70%
          </div>
        </div>

        <!-- Actions -->
        <div  class="actions">
          <div class="checkbox">
            <input 
            type="checkbox" 
            id="complete-toggle" 
            data-testid="test-todo-complete-toggle"
            />
            <label for="complete-toggle" class="checkbox-label">Done</label>
          </div>

          <div id="test-todo-button">
            <button class="btn" id="test-todo-edit-button" type="button">
              Edit
            </button>

            <button class="btn" id="test-todo-delete-button" type="button">
              Delete
            </button>
          </div>

          
        </div>

      </article>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
